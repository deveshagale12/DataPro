spring.application.name=DataPro

# ── Server (REQUIRED for Render) ──────────────────────────────────────
server.port=${PORT:8080}

# ── Supabase PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Add this — prevents dialect detection failure ─────────────────────
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── HikariCP — give DB more time to connect ───────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# ── Mail (Gmail SMTP) ─────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=agaledeva4@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Supabase Storage ──────────────────────────────────────────────────
supabase.url=https://tcdfgwkllbowarpbwhpn.supabase.co
supabase.key=${SUPABASE_KEY}
supabase.bucket=my-bucket

# ── Encryption ────────────────────────────────────────────────────────
app.encryption.secret-key=${ENCRYPTION_KEY}

# ── File Upload ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── Logging ───────────────────────────────────────────────────────────
logging.level.com.example.data_deduplication=DEBUG
logging.level.com.DataPro=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n